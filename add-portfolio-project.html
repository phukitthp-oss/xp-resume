<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Add Project</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #667eea; }
        .form-group {
            margin: 15px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2a2a4e;
            color: #fff;
            font-size: 14px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            border-radius: 10px;
            cursor: pointer;
        }
        .upload-area:hover { background: rgba(102, 126, 234, 0.1); }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .preview-item {
            position: relative;
            aspect-ratio: 16/9;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-item .remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        button.save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button.save:hover { opacity: 0.9; }
        .status { 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px;
            display: none;
        }
        .status.success { background: #27ae60; display: block; }
        .status.error { background: #e74c3c; display: block; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <h1>🎨 Add New Project</h1>
    
    <div class="form-group">
        <label>Project Name *</label>
        <input type="text" id="projectName" value="Port" placeholder="Enter project name">
    </div>
    
    <div class="form-group">
        <label>Category</label>
        <select id="projectCategory">
            <option value="web">Web</option>
            <option value="image">Image</option>
            <option value="video">Video</option>
            <option value="client">Client</option>
            <option value="personal" selected>Personal</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Description</label>
        <input type="text" id="projectDesc" value="Personal Work • Web Design" placeholder="Short description">
    </div>
    
    <div class="form-group">
        <label>Brief</label>
        <textarea id="projectBrief" rows="2" placeholder="Project brief">XP Portfolio - Windows XP style portfolio website</textarea>
    </div>
    
    <p style="margin-top: 20px;">📸 เลือกรูป Banner (สูงสุด 5 รูป)</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        📁 คลิกเพื่อเลือกรูป (เลือกได้หลายรูปพร้อมกัน)
        <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles(this.files)">
    </div>
    
    <div class="preview-grid" id="previewGrid"></div>
    
    <div id="status" class="status"></div>
    
    <button class="save" onclick="saveProject()">💾 Save Project</button>
    
    <script>
        const CONFIG_KEY = 'xp_portfolio_config';
        let bannerImages = [];
        
        function handleFiles(files) {
            for (let file of files) {
                if (bannerImages.length >= 5) break;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    bannerImages.push(e.target.result);
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            }
        }
        
        function renderPreviews() {
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = bannerImages.map((img, i) => `
                <div class="preview-item">
                    <img src="${img}" alt="Banner ${i+1}">
                    <button class="remove" onclick="removeBanner(${i})">×</button>
                </div>
            `).join('');
        }
        
        function removeBanner(index) {
            bannerImages.splice(index, 1);
            renderPreviews();
        }
        
        function saveProject() {
            const projectName = document.getElementById('projectName').value.trim();
            const projectCategory = document.getElementById('projectCategory').value;
            const projectDesc = document.getElementById('projectDesc').value;
            const projectBrief = document.getElementById('projectBrief').value;
            
            if (!projectName) {
                showStatus('กรุณากรอกชื่อ Project', 'error');
                return;
            }
            
            if (bannerImages.length === 0) {
                showStatus('กรุณาเลือกรูปอย่างน้อย 1 รูป', 'error');
                return;
            }
            
            // Load existing config
            let config = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
            if (!config.projects) config.projects = [];
            
            // Check if project already exists
            const existingIndex = config.projects.findIndex(p => p.title === projectName);
            
            const newProject = {
                title: projectName,
                category: projectCategory,
                desc: projectDesc || `Personal Work • ${projectCategory}`,
                color1: '#667eea',
                color2: '#764ba2',
                count: bannerImages.length + ' Items',
                brief: projectBrief || '',
                description: projectBrief || '',
                banners: bannerImages,
                url: ''
            };
            
            if (existingIndex >= 0) {
                config.projects[existingIndex] = newProject;
                showStatus(`✅ "${projectName}" updated! Close this page and refresh main site.`, 'success');
            } else {
                config.projects.push(newProject);
                showStatus(`✅ "${projectName}" added! Close this page and refresh main site.`, 'success');
            }
            
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
    </script>
</body>
</html>
