<!DOCTYPE html>
<html>
<head>
    <title>Debug Skills/Software Save</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #4a90d9; color: white; border: none; border-radius: 4px; }
        button:hover { background: #3a80c9; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; max-height: 300px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        label { font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Test Boot Screen Config</h1>
    
    <div class="test-section">
        <h2>1. Current localStorage Config</h2>
        <pre id="configDisplay">Loading...</pre>
        <button onclick="refreshConfig()">Refresh</button>
    </div>
    
    <div class="test-section">
        <h2>2. Test Save bootText</h2>
        <div>
            <label>Left: <input type="text" id="testLeft" value="TestName"></label><br>
            <label>Right: <input type="text" id="testRight" value="XP"></label><br>
            <label>Subtitle: <input type="text" id="testSubtitle" value="TestRole"></label><br>
            <label>Bottom Left: <input type="text" id="testBottomLeft" value="Test Hint"></label><br>
            <label>Bottom Right: <input type="text" id="testBottomRight" value="Test®"></label><br>
        </div>
        <button onclick="testSave()">Test Save</button>
        <div id="saveResult"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Test showMessage Function</h2>
        <button onclick="testShowMessage()">Test showMessage</button>
        <div id="messageContainer"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Go to Main Site</h2>
        <a href="index.html" target="_blank">Open index.html in new tab</a><br>
        <a href="admin.html" target="_blank">Open admin.html in new tab</a>
    </div>

    <script>
        const CONFIG_KEY = 'xp_portfolio_config';
        
        function loadConfig() {
            try {
                return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
            } catch(e) {
                return {};
            }
        }
        
        function saveConfig(config) {
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        }
        
        function refreshConfig() {
            const config = loadConfig();
            document.getElementById('configDisplay').textContent = JSON.stringify(config, null, 2);
        }
        
        function testSave() {
            const config = loadConfig();
            config.bootText = {
                left: document.getElementById('testLeft').value,
                right: document.getElementById('testRight').value,
                subtitle: document.getElementById('testSubtitle').value,
                bottomLeft: document.getElementById('testBottomLeft').value,
                bottomRight: document.getElementById('testBottomRight').value
            };
            saveConfig(config);
            
            // Verify
            const verify = loadConfig();
            if (verify.bootText && verify.bootText.left === config.bootText.left) {
                document.getElementById('saveResult').innerHTML = '<span class="success">✅ Save successful! bootText saved to localStorage.</span>';
            } else {
                document.getElementById('saveResult').innerHTML = '<span class="error">❌ Save failed!</span>';
            }
            refreshConfig();
        }
        
        function testShowMessage() {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.style.cssText = 'padding: 10px 15px; margin: 10px 0; border-radius: 4px; background: #d4edda; color: #155724; border: 1px solid #c3e6cb;';
            msg.textContent = '✅ Test message displayed!';
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }
        
        // Initialize
        refreshConfig();
    </script>
</body>
</html>
